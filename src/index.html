<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QuickDo</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #111111;
        --bg2: #161618;
        --bg3: #1c1c1f;
        --bg4: #222226;
        --border: rgba(255, 255, 255, 0.06);
        --border-hover: rgba(255, 255, 255, 0.1);
        --text: #e8e8e8;
        --text2: #8d8d9e;
        --text3: #555565;
        --accent: #5e6ad2;
        --accent-hover: #6b77d5;
        --accent-dim: rgba(94, 106, 210, 0.14);
        --green: #26b5a8;
        --green-dim: rgba(38, 181, 168, 0.12);
        --red: #e06c75;
        --red-dim: rgba(224, 108, 117, 0.1);
        --font: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
        --radius: 8px;
        --shadow: 0 24px 64px rgba(0, 0, 0, 0.72), 0 0 0 0.5px rgba(255, 255, 255, 0.03) inset;
      }

      body.light {
        --bg: #f5f5f7;
        --bg2: #ffffff;
        --bg3: #ebebed;
        --bg4: #dcdce0;
        --border: rgba(0, 0, 0, 0.07);
        --border-hover: rgba(0, 0, 0, 0.12);
        --text: #111118;
        --text2: #6e6e80;
        --text3: #9898a8;
        --accent: #5e6ad2;
        --accent-hover: #4f5bc0;
        --accent-dim: rgba(94, 106, 210, 0.1);
        --green: #1ea896;
        --green-dim: rgba(30, 168, 150, 0.1);
        --red: #d44c56;
        --red-dim: rgba(212, 76, 86, 0.08);
        --shadow: 0 8px 32px rgba(0, 0, 0, 0.12), 0 0 0 0.5px rgba(0, 0, 0, 0.06) inset;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-font-smoothing: antialiased;
      }

      html,
      body {
        width: 380px;
        height: auto;
        overflow: hidden;
        background: transparent;
        font-family: var(--font);
      }

      #app {
        width: 380px;
        height: auto;
        background: var(--bg);
        border-radius: var(--radius);
        border: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        position: relative;
        box-shadow: var(--shadow);
        animation: appEntry 0.18s ease forwards;
      }

      @keyframes appEntry {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* ── Header ── */
      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 12px;
        -webkit-app-region: drag;
        flex-shrink: 0;
        border-bottom: 1px solid var(--border);
        background: var(--bg2);
      }

      .header-left {
        display: flex;
        align-items: center;
        gap: 8px;
        -webkit-app-region: drag;
      }

      .header-icon {
        width: 18px;
        height: 18px;
        color: var(--accent);
        flex-shrink: 0;
      }

      .header-title {
        font-size: 13px;
        font-weight: 500;
        color: var(--text);
        letter-spacing: -0.01em;
      }

      .header-right {
        display: flex;
        align-items: center;
        gap: 1px;
        -webkit-app-region: no-drag;
      }

      .header-btn {
        width: 26px;
        height: 26px;
        border-radius: 5px;
        border: none;
        background: transparent;
        color: var(--text3);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.1s, color 0.1s;
      }

      .header-btn:hover {
        background: var(--bg3);
        color: var(--text2);
      }

      .header-btn svg {
        width: 13px;
        height: 13px;
      }

      /* ── Add input ── */
      .add-section {
        padding: 2px 12px;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
        background: var(--bg2);
      }

      .add-input-wrap {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .add-input-icon {
        width: 14px;
        height: 14px;
        color: var(--text3);
        flex-shrink: 0;
      }

      #task-input {
        flex: 1;
        background: transparent;
        border: none;
        outline: none;
        color: var(--text);
        font-family: var(--font);
        font-size: 13px;
        font-weight: 400;
        padding: 9px 0;
        caret-color: var(--accent);
        letter-spacing: -0.006em;
      }

      #task-input::placeholder {
        color: var(--text3);
      }

      .add-btn {
        width: 20px;
        height: 20px;
        border-radius: 4px;
        background: var(--accent);
        border: none;
        color: white;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        transition: opacity 0.12s, background 0.12s;
        opacity: 0;
        pointer-events: none;
      }

      .add-btn.active {
        opacity: 1;
        pointer-events: auto;
      }

      .add-btn:hover {
        background: var(--accent-hover);
      }

      .add-btn svg {
        width: 11px;
        height: 11px;
      }

      .due-toggle-btn {
        width: 22px;
        height: 22px;
        border-radius: 4px;
        border: none;
        background: transparent;
        color: var(--text3);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        transition: background 0.1s, color 0.1s;
      }

      .due-toggle-btn:hover,
      .due-toggle-btn.active {
        background: var(--accent-dim);
        color: var(--accent);
      }

      .due-toggle-btn svg {
        width: 12px;
        height: 12px;
      }

      .due-row {
        display: none;
        align-items: center;
        gap: 6px;
        padding: 4px 0 6px 22px;
      }

      .due-row.visible {
        display: flex;
      }

      .due-row label {
        font-size: 11px;
        color: var(--text3);
        font-family: var(--font);
        flex-shrink: 0;
      }

      #due-input {
        background: var(--bg3);
        border: 1px solid var(--border);
        border-radius: 4px;
        color: var(--text);
        font-family: var(--font);
        font-size: 11px;
        padding: 2px 6px;
        outline: none;
        cursor: pointer;
        color-scheme: dark;
      }

      body.light #due-input {
        color-scheme: light;
      }

      #due-input:focus {
        border-color: var(--accent);
      }

      .clear-due-btn {
        font-size: 10px;
        color: var(--text3);
        background: none;
        border: none;
        cursor: pointer;
        font-family: var(--font);
        padding: 0;
        transition: color 0.1s;
      }

      .clear-due-btn:hover {
        color: var(--red);
      }

      /* ── Filter / tab bar ── */
      .filter-bar {
        display: flex;
        align-items: center;
        padding: 0 6px;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
        background: var(--bg);
        gap: 0;
      }

      .tab-btn {
        display: flex;
        align-items: center;
        gap: 5px;
        padding: 7px 8px;
        border: none;
        background: transparent;
        font-family: var(--font);
        font-size: 12px;
        font-weight: 400;
        color: var(--text3);
        cursor: pointer;
        transition: color 0.1s;
        position: relative;
        border-bottom: 1.5px solid transparent;
        margin-bottom: -1px;
        letter-spacing: -0.005em;
      }

      .tab-btn.active {
        color: var(--text);
        border-bottom-color: var(--accent);
      }

      .tab-btn:hover:not(.active) {
        color: var(--text2);
      }

      .tab-count {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: var(--bg3);
        color: var(--text3);
        font-size: 10px;
        min-width: 16px;
        height: 16px;
        padding: 0 4px;
        border-radius: 3px;
        font-variant-numeric: tabular-nums;
        transition: background 0.1s, color 0.1s;
      }

      .tab-btn.active .tab-count {
        background: var(--accent-dim);
        color: var(--accent);
      }

      .filter-spacer {
        flex: 1;
      }

      .progress-wrap {
        display: flex;
        align-items: center;
        gap: 6px;
        padding-right: 4px;
      }

      .progress-text {
        font-size: 10px;
        color: var(--text3);
        font-variant-numeric: tabular-nums;
        min-width: 24px;
        text-align: right;
      }

      .progress-bar {
        width: 40px;
        height: 2px;
        background: var(--bg4);
        border-radius: 99px;
        overflow: hidden;
      }

      .progress-fill {
        height: 100%;
        background: var(--accent);
        border-radius: 99px;
        transition: width 0.4s ease;
      }

      /* ── Task list ── */
      .list-section {
        flex: 1;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      .task-list {
        flex: 1;
        overflow-y: auto;
        padding: 4px 0 8px;
        max-height: 300px;
      }

      .task-list::-webkit-scrollbar {
        width: 3px;
      }

      .task-list::-webkit-scrollbar-track {
        background: transparent;
      }

      .task-list::-webkit-scrollbar-thumb {
        background: var(--bg4);
        border-radius: 99px;
      }

      /* ── Task item ── */
      .task-item {
        display: flex;
        align-items: center;
        gap: 9px;
        padding: 4px 12px;
        cursor: default;
        transition: background 0.08s;
        position: relative;
        min-height: 32px;
        animation: taskIn 0.16s ease both;
      }

      @keyframes taskIn {
        from {
          opacity: 0;
          transform: translateY(3px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .task-item:hover {
        background: var(--bg3);
      }

      .task-item.removing {
        animation: taskOut 0.2s ease forwards;
      }

      @keyframes taskOut {
        to {
          opacity: 0;
          transform: translateX(10px);
          max-height: 0;
          padding-top: 0;
          padding-bottom: 0;
        }
      }

      .task-item.completing {
        animation: taskComplete 0.36s ease forwards;
      }

      @keyframes taskComplete {
        0% {
          background: transparent;
        }
        35% {
          background: var(--green-dim);
        }
        100% {
          opacity: 0;
          transform: translateX(8px);
          max-height: 0;
          padding-top: 0;
          padding-bottom: 0;
        }
      }

      .task-item.done-item {
        opacity: 0.6;
      }

      .task-item.done-item:hover {
        opacity: 0.85;
      }

      /* ── Status circle (Linear-style) ── */
      .check-btn {
        width: 16px;
        height: 16px;
        flex-shrink: 0;
        background: transparent;
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        transition: transform 0.1s;
      }

      .check-btn:hover {
        transform: scale(1.12);
      }

      .status-circle {
        width: 16px;
        height: 16px;
        border-radius: 50%;
        border: 1.5px solid var(--text3);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: border-color 0.12s, background 0.12s;
        flex-shrink: 0;
      }

      .check-btn:hover .status-circle {
        border-color: var(--accent);
      }

      .status-circle.checked {
        background: var(--accent);
        border-color: var(--accent);
      }

      .status-circle svg {
        width: 9px;
        height: 9px;
        color: white;
        stroke-dasharray: 14;
        stroke-dashoffset: 14;
        transition: stroke-dashoffset 0.18s ease;
      }

      .status-circle.checked svg {
        stroke-dashoffset: 0;
      }

      /* ── Task body ── */
      .task-body {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 1px;
        min-width: 0;
      }

      /* ── Task text ── */
      .task-text {
        font-size: 13px;
        font-weight: 400;
        color: var(--text);
        line-height: 1.4;
        min-width: 0;
        word-break: break-word;
        position: relative;
        letter-spacing: -0.006em;
      }

      .task-text::after {
        content: "";
        position: absolute;
        left: 0;
        top: 50%;
        width: 0;
        height: 1px;
        background: var(--text3);
        transition: width 0.3s ease;
      }

      .task-item.done-item .task-text {
        color: var(--text3);
      }

      .task-item.done-item .task-text::after {
        width: 100%;
      }

      /* ── Task meta (timestamp) ── */
      .task-meta {
        font-size: 10px;
        color: var(--text3);
        opacity: 0.6;
        letter-spacing: -0.003em;
        font-variant-numeric: tabular-nums;
      }

      /* ── Due badge ── */
      .due-badge {
        display: inline-flex;
        align-items: center;
        gap: 3px;
        font-size: 10px;
        font-family: var(--font);
        font-variant-numeric: tabular-nums;
        padding: 2px 5px;
        border-radius: 3px;
        background: var(--bg3);
        color: var(--text3);
        flex-shrink: 0;
        letter-spacing: -0.003em;
        transition: background 0.1s, color 0.1s;
      }

      .due-badge.overdue {
        background: rgba(224, 108, 117, 0.12);
        color: var(--red);
      }

      .due-badge.soon {
        background: rgba(251, 191, 36, 0.1);
        color: #d4a017;
      }

      .due-badge svg {
        width: 9px;
        height: 9px;
        flex-shrink: 0;
      }

      /* ── Delete button ── */
      .delete-btn {
        width: 20px;
        height: 20px;
        border-radius: 4px;
        border: none;
        background: transparent;
        color: var(--text3);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        transition: opacity 0.1s, background 0.1s, color 0.1s;
        flex-shrink: 0;
      }

      .task-item:hover .delete-btn {
        opacity: 1;
      }

      .delete-btn:hover {
        background: var(--red-dim);
        color: var(--red);
      }

      .delete-btn svg {
        width: 11px;
        height: 11px;
      }

      /* ── Empty state ── */
      .empty-state {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 7px;
        padding: 32px 20px;
        animation: fadeIn 0.2s ease;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      .empty-state svg {
        width: 28px;
        height: 28px;
        color: var(--bg4);
      }

      .empty-state p {
        font-size: 12px;
        color: var(--text3);
        text-align: center;
        line-height: 1.5;
      }

      .empty-state .empty-hint {
        font-size: 11px;
        color: var(--text3);
        opacity: 0.5;
      }

      /* ── Footer ── */
      .footer {
        padding: 6px 12px 7px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-top: 1px solid var(--border);
        flex-shrink: 0;
        background: var(--bg2);
      }

      .kbd {
        display: inline-flex;
        align-items: center;
        gap: 2px;
        font-size: 10px;
        color: var(--text3);
        font-family: var(--font);
      }

      .kbd span {
        background: var(--bg4);
        border: 1px solid var(--border);
        border-radius: 3px;
        padding: 1px 4px;
        font-size: 10px;
      }

      .footer-actions {
        display: flex;
        gap: 8px;
        align-items: center;
      }

      .footer-link {
        font-size: 11px;
        color: var(--text3);
        cursor: pointer;
        transition: color 0.1s;
        background: none;
        border: none;
        font-family: var(--font);
        padding: 0;
        letter-spacing: -0.005em;
      }

      .footer-link:hover {
        color: var(--text2);
      }

      .footer-sep {
        color: var(--text3);
        font-size: 10px;
        opacity: 0.35;
      }

      /* ── Confetti ── */
      #confetti-canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 9999;
      }

      /* ── Ripple ── */
      .ripple {
        position: absolute;
        border-radius: 50%;
        background: rgba(94, 106, 210, 0.18);
        transform: scale(0);
        animation: ripple 0.4s ease-out;
        pointer-events: none;
      }

      @keyframes ripple {
        to {
          transform: scale(4);
          opacity: 0;
        }
      }
    </style>
  </head>
  <body>
    <canvas id="confetti-canvas"></canvas>
    <div id="app">
      <!-- Header -->
      <div class="header">
        <div class="header-left">
          <svg
            class="header-icon"
            viewBox="0 0 18 18"
            fill="none"
            stroke="currentColor"
            stroke-width="1.6"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <rect x="2" y="2" width="14" height="14" rx="3" />
            <polyline points="5.5,9 7.5,11 12.5,6" />
          </svg>
          <span class="header-title">My Tasks</span>
        </div>
        <div class="header-right">
          <button class="header-btn" id="theme-btn" title="Toggle theme">
            <!-- Sun icon (shown in dark mode) -->
            <svg id="icon-sun" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="8" cy="8" r="2.8"/>
              <path d="M8 1.5v1M8 13.5v1M1.5 8h1M13.5 8h1M3.4 3.4l.7.7M11.9 11.9l.7.7M11.9 3.4l-.7.7M3.4 11.9l.7-.7"/>
            </svg>
            <!-- Moon icon (shown in light mode) -->
            <svg id="icon-moon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
              <path d="M13 10A5 5 0 016 3a6 6 0 100 10 5 5 0 007-3z"/>
            </svg>
          </button>
          <button class="header-btn" id="clear-done-btn" title="Clear completed">
            <svg
              viewBox="0 0 16 16"
              fill="none"
              stroke="currentColor"
              stroke-width="1.6"
              stroke-linecap="round"
            >
              <path d="M2 4h12l-1 9H3L2 4Z" />
              <path d="M5 4V2h6v2" />
              <path d="M6 7v4M10 7v4" />
            </svg>
          </button>
          <button class="header-btn" id="close-btn" title="Hide (Alt+Q)">
            <svg
              viewBox="0 0 16 16"
              fill="none"
              stroke="currentColor"
              stroke-width="1.6"
              stroke-linecap="round"
            >
              <path d="M4 4l8 8M12 4l-8 8" />
            </svg>
          </button>
        </div>
      </div>

      <!-- Add input -->
      <div class="add-section">
        <div class="add-input-wrap">
          <svg
            class="add-input-icon"
            viewBox="0 0 16 16"
            fill="none"
            stroke="currentColor"
            stroke-width="1.6"
            stroke-linecap="round"
          >
            <path d="M8 3v10M3 8h10" />
          </svg>
          <input
            type="text"
            id="task-input"
            placeholder="Add task..."
            maxlength="120"
            autocomplete="off"
          />
          <button class="due-toggle-btn" id="due-toggle-btn" title="Set due time">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="8" cy="8" r="6"/>
              <path d="M8 5v3.5l2 2"/>
            </svg>
          </button>
          <button class="add-btn" id="add-btn" title="Add task">
            <svg
              viewBox="0 0 16 16"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M13 8H3M8 3l5 5-5 5" />
            </svg>
          </button>
        </div>
        <div class="due-row" id="due-row">
          <label for="due-input">Due:</label>
          <input type="time" id="due-input" />
          <button class="clear-due-btn" id="clear-due-btn">clear</button>
        </div>
      </div>

      <!-- Filter / tab bar -->
      <div class="filter-bar">
        <button class="tab-btn active" id="tab-todo" data-tab="todo">
          Todo <span class="tab-count" id="todo-count">0</span>
        </button>
        <button class="tab-btn" id="tab-done" data-tab="done">
          Done <span class="tab-count" id="done-count">0</span>
        </button>
        <div class="filter-spacer"></div>
        <div class="progress-wrap">
          <span class="progress-text" id="progress-text"></span>
          <div class="progress-bar">
            <div
              class="progress-fill"
              id="progress-fill"
              style="width: 0%"
            ></div>
          </div>
        </div>
      </div>

      <!-- Task list -->
      <div class="list-section">
        <div class="task-list" id="task-list"></div>
      </div>

      <!-- Footer -->
      <div class="footer">
        <div class="kbd">
          <span>Alt</span><span>Q</span>&nbsp;to toggle
        </div>
        <div class="footer-actions">
          <button class="footer-link" id="clear-all-btn">clear all</button>
          <span class="footer-sep">·</span>
          <button class="footer-link" id="reset-day-btn">new day</button>
        </div>
      </div>
    </div>

    <script>
      // ── State ──────────────────────────────────────────────────────────
      let tasks = [];
      let activeTab = "todo";

      // ── Time helpers ──────────────────────────────────────────────────
      function formatTime(ts) {
        return new Date(ts).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
      }

      function formatCreated(ts) {
        const d = new Date(ts);
        const today = new Date();
        const yesterday = new Date(today);
        yesterday.setDate(today.getDate() - 1);
        if (d.toDateString() === today.toDateString()) return formatTime(ts);
        if (d.toDateString() === yesterday.toDateString()) return "yesterday " + formatTime(ts);
        return d.toLocaleDateString([], { month: "short", day: "numeric" }) + " " + formatTime(ts);
      }

      function dueStatus(dueAt) {
        const now = Date.now();
        const diff = dueAt - now;
        if (diff < 0) return "overdue";
        if (diff < 60 * 60 * 1000) return "soon"; // within 1 hour
        return "normal";
      }

      function parseDueTime(timeStr) {
        if (!timeStr) return null;
        const [h, m] = timeStr.split(":").map(Number);
        const d = new Date();
        d.setHours(h, m, 0, 0);
        // if already past, assume tomorrow
        if (d.getTime() < Date.now()) d.setDate(d.getDate() + 1);
        return d.getTime();
      }

      // ── Theme ─────────────────────────────────────────────────────────
      function applyTheme(theme) {
        document.body.classList.toggle("light", theme === "light");
        document.getElementById("icon-sun").style.display = theme === "light" ? "none" : "";
        document.getElementById("icon-moon").style.display = theme === "light" ? "" : "none";
        localStorage.setItem("qd-theme", theme);
      }

      function setupTheme() {
        const saved = localStorage.getItem("qd-theme") || "dark";
        applyTheme(saved);
        document.getElementById("theme-btn").addEventListener("click", () => {
          const isLight = document.body.classList.contains("light");
          applyTheme(isLight ? "dark" : "light");
        });
      }

      // ── Init ──────────────────────────────────────────────────────────
      async function init() {
        setupTheme();
        const saved = await window.quickdo?.getTasks();
        if (saved) tasks = saved;
        render();
        setupInput();
        setupButtons();
      }

      // ── Task CRUD ─────────────────────────────────────────────────────
      function addTask(text, dueAt) {
        const task = {
          id: Date.now().toString(36) + Math.random().toString(36).slice(2),
          text: text.trim(),
          done: false,
          createdAt: Date.now(),
        };
        if (dueAt) task.dueAt = dueAt;
        tasks.unshift(task);
        save();
        if (activeTab === "done") switchTab("todo");
        else render();
      }

      function completeTask(id) {
        const item = document.querySelector(`[data-id="${id}"]`);
        if (!item) return;

        const ripple = document.createElement("div");
        ripple.className = "ripple";
        ripple.style.cssText = `width: 60px; height: 60px; top: -10px; left: -10px;`;
        item.appendChild(ripple);
        setTimeout(() => ripple.remove(), 450);

        item.classList.add("completing");

        setTimeout(() => {
          const t = tasks.find((t) => t.id === id);
          if (t) {
            t.done = true;
            t.completedAt = Date.now();
          }
          save();
          render();
          checkAllDone();
        }, 360);
      }

      function uncompleteTask(id) {
        const t = tasks.find((t) => t.id === id);
        if (t) {
          t.done = false;
          delete t.completedAt;
        }
        save();
        render();
      }

      function removeTask(id) {
        const item = document.querySelector(`[data-id="${id}"]`);
        if (item) {
          item.classList.add("removing");
          setTimeout(() => {
            tasks = tasks.filter((t) => t.id !== id);
            save();
            render();
          }, 200);
        }
      }

      function checkAllDone() {
        const todoTasks = tasks.filter((t) => !t.done);
        if (tasks.length > 0 && todoTasks.length === 0) {
          launchConfetti();
        }
      }

      // ── Window resize ─────────────────────────────────────────────────
      function syncWindowSize() {
        requestAnimationFrame(() => {
          const h = document.getElementById("app").offsetHeight;
          window.quickdo?.resizeWindow(h);
        });
      }

      // ── Render ────────────────────────────────────────────────────────
      function render() {
        const list = document.getElementById("task-list");
        const filtered =
          activeTab === "todo"
            ? tasks.filter((t) => !t.done)
            : tasks.filter((t) => t.done);

        updateStats();

        if (filtered.length === 0) {
          list.innerHTML = "";
          list.appendChild(emptyState());
          return;
        }

        const existing = new Set(
          [...list.querySelectorAll(".task-item")].map((el) => el.dataset.id)
        );
        const current = new Set(filtered.map((t) => t.id));

        list.querySelectorAll(".task-item").forEach((el) => {
          if (
            !current.has(el.dataset.id) &&
            !el.classList.contains("removing") &&
            !el.classList.contains("completing")
          ) {
            el.remove();
          }
        });

        filtered.forEach((task, idx) => {
          if (!existing.has(task.id)) {
            const el = buildTaskEl(task);
            el.style.animationDelay = `${idx * 0.025}s`;
            list.appendChild(el);
          }
        });

        const nowInDom = [
          ...list.querySelectorAll(
            ".task-item:not(.removing):not(.completing)"
          ),
        ].map((el) => el.dataset.id);
        const desired = filtered.map((t) => t.id);
        if (JSON.stringify(nowInDom) !== JSON.stringify(desired)) {
          list.innerHTML = "";
          filtered.forEach((task, idx) => {
            const el = buildTaskEl(task);
            el.style.animationDelay = `${idx * 0.025}s`;
            list.appendChild(el);
          });
        }

        syncWindowSize();
      }

      function buildTaskEl(task) {
        const div = document.createElement("div");
        div.className = `task-item${task.done ? " done-item" : ""}`;
        div.dataset.id = task.id;

        // Status circle (Linear-style)
        const check = document.createElement("button");
        check.className = "check-btn";
        check.title = task.done ? "Mark incomplete" : "Mark complete";

        const circle = document.createElement("div");
        circle.className = `status-circle${task.done ? " checked" : ""}`;
        circle.innerHTML = `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,8 6,12 14,4"/></svg>`;
        check.appendChild(circle);

        check.addEventListener("click", (e) => {
          e.stopPropagation();
          if (task.done) uncompleteTask(task.id);
          else completeTask(task.id);
        });

        // Task body (text + meta)
        const body = document.createElement("div");
        body.className = "task-body";

        const text = document.createElement("span");
        text.className = "task-text";
        text.textContent = task.text;
        body.appendChild(text);

        const meta = document.createElement("span");
        meta.className = "task-meta";
        if (task.done && task.completedAt) {
          meta.textContent = "done " + formatCreated(task.completedAt);
        } else {
          meta.textContent = formatCreated(task.createdAt);
        }
        body.appendChild(meta);

        // Due badge
        let dueBadge = null;
        if (task.dueAt && !task.done) {
          dueBadge = document.createElement("div");
          dueBadge.className = "due-badge";
          dueBadge.dataset.dueAt = task.dueAt;
          const status = dueStatus(task.dueAt);
          if (status !== "normal") dueBadge.classList.add(status);
          dueBadge.innerHTML = `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="8" r="6"/><path d="M8 5v3.5l2 2"/></svg>${formatTime(task.dueAt)}`;
        }

        // Delete
        const del = document.createElement("button");
        del.className = "delete-btn";
        del.title = "Remove";
        del.innerHTML = `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M4 4l8 8M12 4l-8 8"/></svg>`;
        del.addEventListener("click", (e) => {
          e.stopPropagation();
          removeTask(task.id);
        });

        if (dueBadge) {
          div.append(check, body, dueBadge, del);
        } else {
          div.append(check, body, del);
        }
        return div;
      }

      function emptyState() {
        const div = document.createElement("div");
        div.className = "empty-state";
        if (activeTab === "todo") {
          div.innerHTML = `
            <svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round">
              <rect x="4" y="6" width="24" height="22" rx="3"/>
              <path d="M10 13h12M10 18h8M10 23h5"/>
            </svg>
            <p>No tasks — you're clear</p>
            <p class="empty-hint">Type above to add one</p>
          `;
        } else {
          div.innerHTML = `
            <svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round">
              <circle cx="16" cy="16" r="12"/>
              <path d="M10 16l4 4 8-8"/>
            </svg>
            <p>Nothing completed yet</p>
            <p class="empty-hint">Check off tasks to see them here</p>
          `;
        }
        return div;
      }

      function updateStats() {
        const done = tasks.filter((t) => t.done).length;
        const total = tasks.length;
        const todo = total - done;
        const pct = total === 0 ? 0 : Math.round((done / total) * 100);

        document.getElementById("todo-count").textContent = todo;
        document.getElementById("done-count").textContent = done;
        document.getElementById("progress-fill").style.width = `${pct}%`;
        document.getElementById("progress-text").textContent =
          total > 0 ? `${pct}%` : "";
      }

      // ── Input ─────────────────────────────────────────────────────────
      function setupInput() {
        const input = document.getElementById("task-input");
        const btn = document.getElementById("add-btn");
        const dueToggle = document.getElementById("due-toggle-btn");
        const dueRow = document.getElementById("due-row");
        const dueInput = document.getElementById("due-input");
        const clearDue = document.getElementById("clear-due-btn");

        function submitTask() {
          if (!input.value.trim()) return;
          const dueAt = parseDueTime(dueInput.value);
          addTask(input.value, dueAt);
          input.value = "";
          dueInput.value = "";
          btn.classList.remove("active");
          dueRow.classList.remove("visible");
          dueToggle.classList.remove("active");
        }

        input.addEventListener("input", () => {
          btn.classList.toggle("active", input.value.trim().length > 0);
        });

        input.addEventListener("keydown", (e) => {
          if (e.key === "Enter" && input.value.trim()) submitTask();
          if (e.key === "Escape") {
            input.value = "";
            btn.classList.remove("active");
            input.blur();
          }
        });

        btn.addEventListener("click", submitTask);

        dueToggle.addEventListener("click", () => {
          const visible = dueRow.classList.toggle("visible");
          dueToggle.classList.toggle("active", visible);
          if (visible) dueInput.focus();
          syncWindowSize();
        });

        clearDue.addEventListener("click", () => {
          dueInput.value = "";
          dueRow.classList.remove("visible");
          dueToggle.classList.remove("active");
          syncWindowSize();
        });
      }

      // ── Buttons ───────────────────────────────────────────────────────
      function setupButtons() {
        document
          .getElementById("close-btn")
          .addEventListener("click", () => window.quickdo?.closeWindow());

        document
          .getElementById("clear-done-btn")
          .addEventListener("click", () => {
            tasks = tasks.filter((t) => !t.done);
            save();
            render();
          });

        document
          .getElementById("clear-all-btn")
          .addEventListener("click", () => {
            if (tasks.length === 0) return;
            if (confirm("Clear all tasks?")) {
              tasks = [];
              save();
              render();
            }
          });

        document
          .getElementById("reset-day-btn")
          .addEventListener("click", () => {
            if (confirm("Start a new day? (removes completed tasks)")) {
              tasks = tasks.filter((t) => !t.done);
              save();
              render();
            }
          });

        document.querySelectorAll(".tab-btn").forEach((btn) => {
          btn.addEventListener("click", () => switchTab(btn.dataset.tab));
        });
      }

      function switchTab(tab) {
        activeTab = tab;
        document.querySelectorAll(".tab-btn").forEach((b) => {
          b.classList.toggle("active", b.dataset.tab === tab);
        });
        render();
      }

      // ── Persistence ───────────────────────────────────────────────────
      function save() {
        window.quickdo?.saveTasks(tasks);
      }

      // ── Confetti ──────────────────────────────────────────────────────
      function launchConfetti() {
        const canvas = document.getElementById("confetti-canvas");
        const ctx = canvas.getContext("2d");
        canvas.width = 380;
        canvas.height = 560;

        const COLORS = [
          "#5e6ad2", "#818cf8", "#26b5a8", "#f472b6",
          "#fbbf24", "#60a5fa", "#34d399",
        ];
        const pieces = Array.from({ length: 55 }, () => ({
          x: Math.random() * 380,
          y: -10 - Math.random() * 80,
          r: 2.5 + Math.random() * 4,
          d: 2 + Math.random() * 3,
          color: COLORS[Math.floor(Math.random() * COLORS.length)],
          tilt: Math.random() * 20 - 10,
          tiltAngle: 0,
          tiltSpeed: 0.05 + Math.random() * 0.1,
        }));

        let frame = 0;
        const maxFrames = 110;

        function draw() {
          if (frame >= maxFrames) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            return;
          }
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          pieces.forEach((p) => {
            p.tiltAngle += p.tiltSpeed;
            p.y += p.d;
            p.x += Math.sin(p.tiltAngle) * 1.5;
            p.tilt = Math.sin(p.tiltAngle) * 12;
            ctx.beginPath();
            ctx.lineWidth = p.r;
            ctx.strokeStyle = p.color;
            ctx.moveTo(p.x + p.tilt + p.r / 3, p.y);
            ctx.lineTo(p.x + p.tilt, p.y + p.tilt + p.r / 5);
            ctx.stroke();
          });
          frame++;
          requestAnimationFrame(draw);
        }
        draw();
      }

      // ── Overdue badge refresh (every 30s) ────────────────────────────
      setInterval(() => {
        document.querySelectorAll(".due-badge[data-due-at]").forEach((el) => {
          const dueAt = Number(el.dataset.dueAt);
          const status = dueStatus(dueAt);
          el.classList.remove("overdue", "soon");
          if (status !== "normal") el.classList.add(status);
        });
      }, 30000);

      // ── Dev mode fallback (no Electron) ──────────────────────────────
      if (!window.quickdo) {
        window.quickdo = {
          getTasks: () =>
            Promise.resolve(
              JSON.parse(localStorage.getItem("qd-tasks") || "[]")
            ),
          saveTasks: (t) =>
            localStorage.setItem("qd-tasks", JSON.stringify(t)),
          closeWindow: () => window.close(),
        };
      }

      init();
    </script>
  </body>
</html>
